<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Settings | Regal Rooms</title>
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<link rel="stylesheet" href="css/admin.css">
<style>
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-sub);}
    .form-group input {
        width: 100%; padding: 12px; border: 1.5px solid #e5e7eb; border-radius: 8px; outline: none; transition: 0.3s;
        font-family: 'Inter', sans-serif; background: #fafafa; box-sizing: border-box;
    }
    .form-group input:focus { border-color: var(--gold); background: white; }
</style>
</head>
<body>

<aside class="sidebar" aria-label="Main Navigation">
    <div class="brand-area">
        <h2>Regal Rooms</h2>
        <span style="color: var(--text-sub); font-size: 0.8rem; letter-spacing: 1px;">ADMIN PORTAL</span>
    </div>
    <nav class="nav-menu" role="navigation">
            <a href="admin-dashboard.html" class="nav-link"><i class="ph ph-squares-four" aria-hidden="true"></i> Overview</a>
            <a href="admin-visitors.html" class="nav-link"><i class="ph ph-users-three"></i> Visitor Logs</a>
            <a href="admin-tenants.html" class="nav-link"><i class="ph ph-users" aria-hidden="true"></i> Tenants & Rooms</a>
            <a href="admin-billing.html" class="nav-link"><i class="ph ph-receipt" aria-hidden="true"></i> Billing & Finance</a>
            <a href="admin-requests.html" class="nav-link"><i class="ph ph-wrench" aria-hidden="true"></i> Maintenance</a>
            <a href="admin-announcements.html" class="nav-link"><i class="ph ph-megaphone" aria-hidden="true"></i> Announcements</a>
            <a href="admin-messages.html" class="nav-link"><i class="ph ph-envelope-open" aria-hidden="true"></i> Messages</a>
            <a href="admin-services.html" class="nav-link"><i class="ph ph-sparkle" aria-hidden="true"></i> Amenity Services</a>
            <a href="admin-reports.html" class="nav-link"><i class="ph ph-chart-bar" aria-hidden="true"></i> Reports</a>
            <a href="admin-settings.html" class="nav-link active"><i class="ph ph-gear" aria-hidden="true"></i> System Settings</a>
    </nav>
    <button id="logoutBtn" class="logout-btn"><i class="ph ph-sign-out"></i> System Logout</button>
</aside>

<main class="main-content">
    <header class="top-header animate-element">
        <div>
            <button id="mobileMenuBtn" class="mobile-menu-btn" aria-label="Open Mobile Menu"><i class="ph ph-list"></i></button>
            <div>
                <h1>System Settings</h1>
                <p style="color: var(--text-submain);">Configure portal preferences and security.</p>
            </div>
        </div>
        <div class="user-profile" aria-label="User Profile">
            <div class="user-avatar" aria-hidden="true"><i class="ph ph-shield-check" style="font-size: 1.2rem;"></i></div>
            <span id="adminName" style="font-weight: 600;">System Admin</span>
        </div>
    </header>

    <div class="dashboard-grid" style="grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));">

        <div class="card animate-element">
            <h3 style="font-family: 'DM Sans'; font-size: 1.2rem; font-weight: 700; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px;">Admin Account</h3>
            <form id="adminForm">
                <div class="form-group">
                    <label for="adminNameInput">Admin Name</label>
                    <input type="text" id="adminNameInput" value="System Administrator" required>
                </div>
                <div class="form-group">
                    <label for="adminEmail">Admin Login Email</label>
                    <input type="email" id="adminEmail" value="regalsapartment@gmail.com" required>
                </div>
                <button type="submit" class="btn btn-primary"><i class="ph ph-floppy-disk"></i> Save Changes</button>
            </form>
        </div>

        <div class="card animate-element">
            <h3 style="font-family: 'DM Sans'; font-size: 1.2rem; font-weight: 700; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px;">Update Master Key</h3>
            <form id="masterKeyForm">
                <div class="form-group">
                    <label for="currentKey">Current Security Key</label>
                    <input type="password" id="currentKey" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label for="newKey">New Security Key</label>
                    <input type="password" id="newKey" placeholder="Create new key" required>
                </div>
                <button type="submit" class="btn btn-primary" style="background: var(--gold); color: var(--primary);"><i class="ph ph-lock-key"></i> Update Key</button>
            </form>
        </div>

    </div>
</main>

<script>
  //laban clickjacking//
if (window.top !== window.self) {
alert("Clickjacking detected!");
window.top.location = window.location;
}
// ===============================
// PROTECT PAGE ACCESS
// ===============================
const adminId = localStorage.getItem("adminId");
if (!adminId) {
    window.location.href = "login.html"; // redirect if not logged in
}

// ===============================
// LOGOUT BUTTON
// ===============================
document.getElementById("logoutBtn").addEventListener("click", () => {
    localStorage.clear();
    window.location.href = "admin-index.html";
  });

// ===============================
// FORMS FUNCTIONALITY
// ===============================
document.getElementById("adminForm").addEventListener("submit", (e) => {
    e.preventDefault();
    
    // Get the new admin name from the form
    const newAdminName = document.getElementById("adminNameInput").value;
    
    // Update admin name using the function from admin.js
    if (typeof updateAdminName === 'function') {
        updateAdminName(newAdminName);
    }
    
    alert("Admin settings saved successfully!");
});

document.getElementById("masterKeyForm").addEventListener("submit", (e) => {
    e.preventDefault();
    alert("Master key updated successfully!");
    e.target.reset();
});

// Load current admin name when page loads
document.addEventListener('DOMContentLoaded', () => {
    const savedAdminName = localStorage.getItem('adminName');
    if (savedAdminName) {
        document.getElementById("adminNameInput").value = savedAdminName;
    }
});
</script>

<script src="js/admin.js"></script>
</body>
</html>
